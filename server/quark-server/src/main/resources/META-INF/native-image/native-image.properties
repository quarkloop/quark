# =============================================================================
# Native-image build configuration for quark-server (CONTROL PLANE)
# =============================================================================
# This file is automatically discovered by the native-image builder when
# the quark-server module is on the classpath during a native build.
#
# IMPORTANT: do NOT add --macro:truffle-svm here. GraalJS/Truffle is the
# runtime module's concern only. The control plane uses SimpleSystemParser
# (regex-based) and routes .quark.ts execution requests to the data plane
# via NATS. Keeping Truffle out of this binary is what makes the server
# native image small enough to build on an 8 GB machine.
#
# Memory optimization flags:
#   -J-Xmx2g             — 2 GB heap (analysis is small without Truffle)
#   --parallelism=2      — 2 threads (low peak memory)
#   -J-XX:SoftMaxHeapSize=1500m — GC tries to keep heap below 1.5 GB
# =============================================================================

Args = -H:+UnlockExperimentalVMOptions \
       -H:+JNI \
       -H:+ReportExceptionStackTraces \
       -H:ReflectionConfigurationResources=META-INF/native-image/reflection.json \
       -H:ResourceConfigurationResources=META-INF/native-image/resource-config.json \
       -J-Xmx2g \
       -J-XX:SoftMaxHeapSize=1500m \
       --parallelism=2 \
       -J-XX:-UseGCOverheadLimit
