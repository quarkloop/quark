# =============================================================================
# Quark Platform — application.properties
# =============================================================================
# Configures the Quarkus HTTP server, the Quark filesystem state root, and
# OpenAPI documentation.
#
# This file is loaded for all profiles. Profile-specific overrides live in
# application-dev.properties (dev) and application-prod.properties (prod).
# =============================================================================

# -----------------------------------------------------------------------------
# HTTP server
# -----------------------------------------------------------------------------
quarkus.http.port=8080
quarkus.http.host=0.0.0.0
quarkus.http.root-path=/
# Reasonable defaults; tune for production.
quarkus.http.limits.max-body-size=1M
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern=%h %l %u %t "%r" %s %b (%D ms)

# -----------------------------------------------------------------------------
# Quark platform configuration
# -----------------------------------------------------------------------------
quark.state.root=${QUARK_STATE_ROOT:./quark-state}
quark.namespace.default=default

# -----------------------------------------------------------------------------
# NATS configuration (embedded server connects here)
# -----------------------------------------------------------------------------
quark.nats.url=nats://localhost:4222

# Event store path (used by JsonlEventStore). Set to a path under the state root
# so events live alongside the system they belong to. NOTE: JsonlEventStore
# routes events per-system automatically; this property is only used for the
# fallback platform-events.jsonl file.
quark.event.store.path=${quark.state.root}/platform-events.jsonl

# -----------------------------------------------------------------------------
# REST / OpenAPI / Swagger UI
# -----------------------------------------------------------------------------
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.info-title=Quark Platform API
quarkus.smallrye-openapi.info-version=${quark.version:0.1.0-SNAPSHOT}
quarkus.smallrye-openapi.info-description=A universal runtime for programmable nodes.
quarkus.smallrye-openapi.info-contact-url=https://github.com/quarkloop/quark

# -----------------------------------------------------------------------------
# Health checks (SmallRye Health)
# -----------------------------------------------------------------------------
# The /q/health endpoint exposes platform liveness/readiness. We add a custom
# HealthCheck that verifies the state root directory is writable.
quarkus.health.extensions.enabled=true

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
quarkus.log.level=INFO
quarkus.log.console.format=%d{HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.console.color=true
quarkus.log.category."com.quarkloop.quark".level=INFO
quarkus.log.category."com.quarkloop.quark.core.engine".level=INFO
quarkus.log.category."com.quarkloop.quark.app".level=INFO

# -----------------------------------------------------------------------------
# Scheduler (used for source/schedule triggers if registered)
# -----------------------------------------------------------------------------
quarkus.scheduler.enabled=true
quarkus.scheduler.start-mode=normal

# -----------------------------------------------------------------------------
# Streaming HTTP server (shared by all endpoint/stream nodes)
# -----------------------------------------------------------------------------
# This is a SINGLE shared HTTP server. All streaming endpoints register URL
# routes with it. Each tenant gets a unique URL: /stream/<ns>/<sys>/<node>.
# Do NOT change the port without updating your load balancer / firewall rules.
quark.streaming.host=0.0.0.0
quark.streaming.port=8081
quark.streaming.path-prefix=stream

# -----------------------------------------------------------------------------
# Packaging — legacy-jar layout.
#
# The control plane (server) does not include GraalJS. legacy-jar gives a
# flat lib/ directory which is simpler for tooling and identical to what
# the runtime module uses.
# -----------------------------------------------------------------------------
quarkus.package.jar.type=legacy-jar

# -----------------------------------------------------------------------------
# Platform mode: standalone (default, control plane) or data (data-plane process)
# -----------------------------------------------------------------------------
quark.mode=standalone
quark.dataplane.runtimeId=none

# -----------------------------------------------------------------------------
# Observability
# -----------------------------------------------------------------------------
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
# OpenTelemetry — disabled by default to avoid OTLP export errors.
# Enable by setting quarkus.otel.enabled=true and configuring the exporter endpoint.
quarkus.otel.enabled=false

# -----------------------------------------------------------------------------
# Event retention
# -----------------------------------------------------------------------------
quark.event.retention-days=30
quark.event.retention-batch-size=10000

# -----------------------------------------------------------------------------
# Native image build configuration — CONTROL PLANE
# -----------------------------------------------------------------------------
# These settings are only used when building with the `native` Maven profile
# (mvn -Pnative install / make build-native). They have no effect on JVM-mode
# builds.
#
# IMPORTANT: the control plane must NOT include --macro:truffle-svm.
# GraalJS/Truffle lives exclusively in the runtime module's native image.
# The control plane uses SimpleSystemParser (regex-based, no GraalJS) to
# parse .quark.ts files. Keeping Truffle out of the server native image
# is what makes it small (~3K types, ~1 min build, ~1 GB peak RAM) versus
# the runtime native image (~29K types, ~8 min build, ~5 GB peak RAM).
#
# Key flags:
#   -H:+JNI
#       Required by JNI for native library loading.
#   -H:+ReportExceptionStackTraces
#       Full stack traces in build errors.
#   --initialize-at-run-time=io.nats.client.support.RandomUtils
#       NATS client creates Random instances in static fields that must not
#       be in the image heap.
#   -J--add-exports=java.base/sun.security.x509=ALL-UNNAMED
#       Required by the EdDSA library (NATS dependency) which accesses
#       internal JDK security classes.
#   -J-Xmx2g
#       Builder heap. The control plane analysis is small enough to fit in 2 GB.
#       --parallelism=2 trades a little wall-clock for lower peak memory.
#       -J-XX:-UseGCOverheadLimit prevents GC overhead limit errors.
# -----------------------------------------------------------------------------
quarkus.native.additional-build-args=-H:+UnlockExperimentalVMOptions,\
  -H:+JNI,\
  -H:+ReportExceptionStackTraces,\
  --initialize-at-run-time=io.nats.client.support.RandomUtils,\
  -J--add-exports=java.base/sun.security.x509=ALL-UNNAMED,\
  -J-Xmx2g,\
  --parallelism=2,\
  -J-XX:-UseGCOverheadLimit

# -----------------------------------------------------------------------------
# Build-time version (populated by Maven filtering — see pom.xml)
# -----------------------------------------------------------------------------
quark.version=0.1.0-SNAPSHOT
