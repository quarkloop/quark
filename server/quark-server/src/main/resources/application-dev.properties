# =============================================================================
# Quark Platform — Dev profile overrides
# =============================================================================
# Loaded when Quarkus runs with the `dev` profile (mvn quarkus:dev) or the
# `test` profile (@QuarkusTest). These overrides are merged on top of
# application.properties.
# =============================================================================

# Use a temp-dir-based state root for dev so we don't pollute the working dir.
%dev.quark.state.root=${java.io.tmpdir}/quark-state-dev

# Keep root log at INFO — setting it to DEBUG enables Quarkus internal
# classloader/debug logging which floods the console with noise.
%dev.quarkus.log.level=INFO

# Only our application categories get DEBUG for development.
%dev.quarkus.log.category."com.quarkloop.quark".level=DEBUG
%dev.quarkus.log.category."com.quarkloop.quark.app".level=DEBUG
%dev.quarkus.log.category."com.quarkloop.quark.runtime".level=DEBUG

# Swagger UI auto-opens in dev.
%dev.quarkus.swagger-ui.always-include=true

# Test profile uses a similar temp dir.
%test.quark.state.root=${java.io.tmpdir}/quark-state-test
%test.quarkus.log.level=WARN
%test.quarkus.log.category."com.quarkloop.quark".level=INFO
