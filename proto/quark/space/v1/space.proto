syntax = "proto3";

package quark.space.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/quarkloop/pkg/serviceapi/gen/quark/space/v1;spacev1";

// SpaceService owns Quark space metadata, Quarkfile state, and derived paths.
service SpaceService {
  rpc CreateSpace(CreateSpaceRequest) returns (Space);
  rpc UpdateQuarkfile(UpdateQuarkfileRequest) returns (Space);
  rpc GetSpace(GetSpaceRequest) returns (Space);
  rpc ListSpaces(google.protobuf.Empty) returns (ListSpacesResponse);
  rpc DeleteSpace(DeleteSpaceRequest) returns (google.protobuf.Empty);
  rpc GetQuarkfile(GetQuarkfileRequest) returns (QuarkfileResponse);
  rpc GetAgentEnvironment(GetAgentEnvironmentRequest) returns (AgentEnvironmentResponse);
  rpc GetSpacePaths(GetSpacePathsRequest) returns (SpacePaths);
  rpc Doctor(DoctorRequest) returns (DoctorResponse);
}

message Space {
  string name = 1;
  string version = 2;
  string working_dir = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message CreateSpaceRequest {
  string name = 1;
  bytes quarkfile = 2;
  string working_dir = 3;
}

message UpdateQuarkfileRequest {
  string name = 1;
  bytes quarkfile = 2;
}

message GetSpaceRequest {
  string name = 1;
}

message ListSpacesResponse {
  repeated Space spaces = 1;
}

message DeleteSpaceRequest {
  string name = 1;
}

message GetQuarkfileRequest {
  string name = 1;
}

message QuarkfileResponse {
  string name = 1;
  string version = 2;
  bytes quarkfile = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message GetAgentEnvironmentRequest {
  string name = 1;
}

message AgentEnvironmentResponse {
  repeated string entries = 1;
}

message GetSpacePathsRequest {
  string name = 1;
}

message SpacePaths {
  string root_dir = 1;
  string quarkfile_path = 2;
  string kb_dir = 3;
  string plugins_dir = 4;
  string sessions_dir = 5;
}

message DoctorRequest {
  string name = 1;
}

message DoctorResponse {
  bool ok = 1;
  repeated DoctorIssue issues = 2;
}

message DoctorIssue {
  string severity = 1;
  string message = 2;
}
