syntax = "proto3";

package quark.buildrelease.v1;

option go_package = "github.com/quarkloop/pkg/serviceapi/gen/quark/buildrelease/v1;buildreleasev1";

// BuildReleaseService runs Quark's release pipeline as an independently
// deployable service instead of an agent plugin implementation detail.
service BuildReleaseService {
  rpc Release(ReleaseRequest) returns (ReleaseResponse);
  rpc DryRun(DryRunRequest) returns (DryRunResponse);
  rpc Init(InitRequest) returns (InitResponse);
}

message ReleaseRequest {
  string working_dir = 1;
  string config_path = 2;
  string version = 3;
  int32 parallelism = 4;
  bool skip_tests = 5;
}

message DryRunRequest {
  string working_dir = 1;
  string config_path = 2;
  string version = 3;
  int32 parallelism = 4;
}

message InitRequest {
  string working_dir = 1;
  bool overwrite = 2;
}

message Artifact {
  string build_name = 1;
  string os = 2;
  string arch = 3;
  string arm = 4;
  string filename = 5;
  string archive_name = 6;
  string checksum = 7;
  int64 size = 8;
  int64 duration_millis = 9;
  string error = 10;
}

message ReleaseResponse {
  bool success = 1;
  string message = 2;
  string version = 3;
  string release_dir = 4;
  repeated Artifact artifacts = 5;
}

message DryRunResponse {
  string version = 1;
  repeated Artifact planned = 2;
}

message InitResponse {
  string config_path = 1;
  bool created = 2;
}
