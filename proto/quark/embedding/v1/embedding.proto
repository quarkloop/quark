syntax = "proto3";

package quark.embedding.v1;

option go_package = "github.com/quarkloop/pkg/serviceapi/gen/quark/embedding/v1;embeddingv1";

// EmbeddingService creates deterministic or provider-backed text embeddings.
service EmbeddingService {
  rpc Embed(EmbedRequest) returns (EmbedResponse);
}

message EmbedRequest {
  string input = 1;
  string model = 2;
  int32 dimensions = 3;
}

message EmbedResponse {
  repeated float vector = 1;
  string model = 2;
  int32 dimensions = 3;
  string provider = 4;
  string content_hash = 5;
}
