# =============================================================================
# Native-image build configuration for quark-runtime-runner (DATA PLANE)
# =============================================================================
# This file is automatically discovered by the native-image builder when
# the quark-runtime-runner module is on the classpath during a native build.
#
# The --macro:truffle-svm flag is REQUIRED here — it statically compiles
# the GraalJS/Truffle interpreter into the binary so the data plane can
# execute TypeScript nodes at runtime. This is the entire reason the
# runtime module exists separately from the server module.
#
# Memory flags tuned for an 8 GB system:
#   -J-Xmx3500m          — 3.5 GB heap (Truffle analysis needs ~3-4 GB peak;
#                          we keep the heap below 3.5 GB so the OS + native-image
#                          compiler have ~4 GB to work with)
#   --parallelism=2      — 2 threads (GraalVM CE 21.0.2 requires parallelism >= 2)
#   -J-XX:SoftMaxHeapSize=3000m — GC tries to keep heap below 3 GB
# =============================================================================

Args = -H:+UnlockExperimentalVMOptions \
       -H:+JNI \
       -H:+ReportExceptionStackTraces \
       --macro:truffle-svm \
       -H:ReflectionConfigurationResources=META-INF/native-image/reflection.json \
       -H:ResourceConfigurationResources=META-INF/native-image/resource-config.json \
       --initialize-at-run-time=io.nats.client.support.RandomUtils \
       -J--add-exports=java.base/sun.security.x509=ALL-UNNAMED \
       -J-Xmx3500m \
       -J-XX:SoftMaxHeapSize=3000m \
       --parallelism=2 \
       -J-XX:-UseGCOverheadLimit
