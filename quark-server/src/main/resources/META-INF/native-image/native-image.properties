# =============================================================================
# Native-image build configuration for quark-server
# =============================================================================
# This file is automatically discovered by the native-image builder when
# the quark-server module is on the classpath during a native build.
#
# In native mode, GraalJS/Truffle is excluded (see the native Maven profile
# in pom.xml). The SimpleSystemParser is used instead — it does not require
# GraalJS. Therefore, no GraalJS-specific native-image flags are needed here.
#
# The only flags needed are:
#   -H:+JNI              — DuckDB JDBC loads libduckdb.so via System.loadLibrary
#   -H:+ReportExceptionStackTraces — full stack traces in build errors
# =============================================================================

Args = -H:+UnlockExperimentalVMOptions \
       -H:+JNI \
       -H:+ReportExceptionStackTraces \
       -H:ReflectionConfigurationResources=META-INF/native-image/reflection.json \
       -H:ResourceConfigurationResources=META-INF/native-image/resource-config.json \
       -J-Xmx4g
