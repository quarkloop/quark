# =============================================================================
# Native-image build configuration for quark-server
# =============================================================================
# This file is automatically discovered by the native-image builder when
# the quark-server module is on the classpath during a native build.
#
# The --macro:truffle-svm flag (passed via application.properties) handles all
# Truffle/GraalJS class initialization automatically.
#
# Memory optimization flags for 8GB systems:
#   -J-Xmx4g             — 4GB heap (enough for analysis, tight for compilation)
#   --parallelism=2      — 2 threads (reduces peak memory vs 4 threads)
#   -J-XX:SoftMaxHeapSize=3000m — GC tries to keep heap below 3GB
#   -H:-IncludeMethodData — Reduces compilation memory by skipping method data
# =============================================================================

Args = -H:+UnlockExperimentalVMOptions \
       -H:+JNI \
       -H:+ReportExceptionStackTraces \
       -H:ReflectionConfigurationResources=META-INF/native-image/reflection.json \
       -H:ResourceConfigurationResources=META-INF/native-image/resource-config.json \
       -J-Xmx4g \
       -J-XX:SoftMaxHeapSize=3000m \
       --parallelism=2 \
       -J-XX:-UseGCOverheadLimit
