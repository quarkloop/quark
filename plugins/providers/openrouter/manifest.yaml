name: openrouter
version: "1.0.0"
type: provider
description: "OpenRouter API provider (GPT-4, Claude, Llama, etc.)"
author: quarkloop
license: Apache-2.0
repository: github.com/quarkloop/quark/plugins/providers/openrouter

mode: lib

build:
  lib_target: plugin.so

provider:
  api_base: "https://openrouter.ai/api/v1"
  auth_env: "OPENROUTER_API_KEY"
  supports_native_tools: true
  supports_streaming: true
  default_model: "openai/gpt-4o-mini"
