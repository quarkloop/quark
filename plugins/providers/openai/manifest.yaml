name: openai
version: "1.0.0"
type: provider
description: "OpenAI API provider (GPT-4, GPT-4o)"
author: quarkloop
license: Apache-2.0
repository: github.com/quarkloop/quark/plugins/providers/openai

mode: lib

build:
  lib_target: plugin.so

provider:
  api_base: "https://api.openai.com/v1"
  auth_env: "OPENAI_API_KEY"
  supports_native_tools: true
  supports_streaming: true
  default_model: "gpt-4o"
  models:
    - id: "gpt-4o"
      name: "GPT-4o"
      context_window: 128000
      default: true
    - id: "gpt-4o-mini"
      name: "GPT-4o Mini"
      context_window: 128000
    - id: "gpt-4-turbo"
      name: "GPT-4 Turbo"
      context_window: 128000
    - id: "gpt-4"
      name: "GPT-4"
      context_window: 8192
    - id: "gpt-3.5-turbo"
      name: "GPT-3.5 Turbo"
      context_window: 16385
