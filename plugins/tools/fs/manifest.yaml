name: fs
version: "1.0.0"
type: tool
mode: lib
description: "Filesystem operations — replaces read, write, list, stat tools"
author: quarkloop
license: Apache-2.0

build:
  lib_target: plugin.so
  api_target: fs
  api_entry_point: ./cmd/fs

tool:
  schema:
    name: fs
    description: "Read, write, append, replace, list, stat, remove files, and extract text from PDFs"
    parameters:
      type: object
      properties:
        command:
          type: string
          enum: [read, write, append, replace, list, stat, rm, extract_pdf]
        path:
          type: string
        content:
          type: string
        find:
          type: string
        replace_with:
          type: string
        start_line:
          type: integer
          description: "1-based start line for partial read"
        end_line:
          type: integer
          description: "1-based inclusive end line for partial read"
        max_chars:
          type: integer
          description: "Maximum characters to return for PDF extraction; 0 means no limit"
        recursive:
          type: boolean
          description: "For list, walk the directory recursively"
        include_hash:
          type: boolean
          description: "For list/stat, include sha256 for regular files"
      required: [command, path]
  permissions:
    filesystem: ["*"]
    network: false
