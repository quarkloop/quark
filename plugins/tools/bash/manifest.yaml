name: bash
version: "1.0.0"
type: tool
description: "Shell command execution with sandboxing support"
author: quarkloop
license: Apache-2.0
repository: github.com/quarkloop/quark/plugins/tools/bash

mode: lib

build:
  lib_target: plugin.so
  api_target: bash
  api_entry_point: ./cmd/bash

tool:
  schema:
    name: bash
    description: "Execute a shell command and return output"
    parameters:
      type: object
      properties:
        cmd:
          type: string
          description: "Shell command to execute"
      required:
        - cmd
  permissions:
    filesystem:
      - "*"
    network: false
