name: build-release
version: "1.0.0"
type: tool
mode: cli
description: "Cross-compile Go binaries and package releases"
author: quarkloop
license: Apache-2.0

build:
  api_target: build-release
  api_entry_point: ./cmd/build-release

tool:
  schema:
    name: build-release
    description: "Build Go release artifacts with cross-compilation, checksums, and install scripts"
    parameters:
      type: object
      properties:
        command:
          type: string
          enum: [release, dryrun, init]
        config:
          type: string
          description: "Path to build_release.json config file"
        version:
          type: string
          description: "Override version string"
        parallel:
          type: integer
          description: "Number of parallel builds"
        skip_tests:
          type: boolean
          description: "Skip running tests before build"
      required: [command]
  permissions:
    filesystem: ["*"]
    network: false
