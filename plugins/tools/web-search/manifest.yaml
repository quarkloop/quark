name: web-search
version: "1.0.0"
type: tool
description: "Web search via Brave or SerpAPI"
author: quarkloop
license: Apache-2.0
repository: github.com/quarkloop/quark/plugins/tools/web-search

mode: lib

build:
  lib_target: plugin.so
  binary_target: web-search
  entry_point: ./cmd/web-search

tool:
  schema:
    name: search
    description: "Search the web using Brave or SerpAPI"
    parameters:
      type: object
      properties:
        q:
          type: string
          description: "Search query"
        max_results:
          type: integer
          description: "Maximum number of results (default 10)"
      required:
        - q
  permissions:
    filesystem: []
    network: true
