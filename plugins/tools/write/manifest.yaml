name: write
version: "1.0.0"
type: tool
description: "Write and edit regular text files"
author: quarkloop
license: Apache-2.0
repository: github.com/quarkloop/quark/plugins/tools/write

mode: lib

build:
  lib_target: plugin.so
  binary_target: write
  entry_point: ./cmd/write

tool:
  schema:
    name: write
    description: "Write, append, replace, or edit text files"
    parameters:
      type: object
      properties:
        path:
          type: string
          description: "Path to the file"
        operation:
          type: string
          enum:
            - write
            - append
            - replace
            - edit
          description: "Operation type (write, append, replace, edit)"
        content:
          type: string
          description: "Content to write (for write/append operations)"
        find:
          type: string
          description: "Text to find (for replace operation)"
        replace_with:
          type: string
          description: "Replacement text (for replace operation)"
        edits:
          type: array
          description: "Array of edit operations (for edit operation)"
          items:
            type: object
            properties:
              start_line:
                type: integer
              start_column:
                type: integer
              end_line:
                type: integer
              end_column:
                type: integer
              new_text:
                type: string
      required:
        - path
        - operation
  permissions:
    filesystem:
      - "*"
    network: false
