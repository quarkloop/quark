name: tool-read
version: "1.0.0"
type: tool
description: "Read regular text files with line range support"
author: quarkloop
license: Apache-2.0
repository: github.com/quarkloop/quark/plugins/tool-read

permissions:
  filesystem: ["*"]
  network: false

interface:
  mode: [cli, http]
  commands: [read]
  endpoint: "/read"
