# =============================================================================
# Quark Runtime (Data Plane) — application.properties
# =============================================================================
# This file is loaded when the runtime/quark-runtime binary starts. The
# runtime is a data-plane process: no REST API, no Swagger, only a health
# endpoint and the NATS command listener.
#
# The control plane spawns this process with -D overrides for:
#   quark.mode=data
#   quark.dataplane.runtimeId=shared   (or ns-<namespace>)
#   quark.state.root=...
#   quark.nats.url=...
#   quarkus.http.port=9100+            (assigned by ProcessManager)
# =============================================================================

# -----------------------------------------------------------------------------
# HTTP server (data-plane health checks only)
# -----------------------------------------------------------------------------
quarkus.http.port=9100
quarkus.http.host=127.0.0.1
quarkus.http.root-path=/
quarkus.http.limits.max-body-size=1M

# Disable access log on the data plane (logs go to dataplane-logs/<id>.log)
quarkus.http.access-log.enabled=false

# -----------------------------------------------------------------------------
# Quark platform configuration
# -----------------------------------------------------------------------------
quark.state.root=${QUARK_STATE_ROOT:./quark-state}
quark.namespace.default=default
quark.nats.url=nats://localhost:4222

# Data-plane mode (always overridden by ProcessManager spawn args)
quark.mode=data
quark.dataplane.runtimeId=none

# -----------------------------------------------------------------------------
# REST / OpenAPI / Swagger UI — DISABLED on the data plane
# -----------------------------------------------------------------------------
quarkus.swagger-ui.always-include=false
quarkus.smallrye-openapi.enable=false

# -----------------------------------------------------------------------------
# Health checks
# -----------------------------------------------------------------------------
quarkus.health.extensions.enabled=true

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
quarkus.log.level=INFO
quarkus.log.console.format=%d{HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.console.color=true
quarkus.log.category."com.quarkloop.quark".level=INFO
quarkus.log.category."com.quarkloop.quark.core.engine".level=INFO
quarkus.log.category."com.quarkloop.quark.runtime".level=INFO

# -----------------------------------------------------------------------------
# Scheduler (used by timer providers)
# -----------------------------------------------------------------------------
quarkus.scheduler.enabled=true
quarkus.scheduler.start-mode=normal

# -----------------------------------------------------------------------------
# Streaming HTTP server (for endpoint/stream nodes)
# -----------------------------------------------------------------------------
quark.streaming.host=0.0.0.0
quark.streaming.port=9101
quark.streaming.path-prefix=stream

# -----------------------------------------------------------------------------
# Packaging — legacy-jar to avoid GraalJS classloader split.
#
# Quarkus's default fast-jar layout puts some jars in lib/boot/ (system
# classloader) and others in lib/main/ (Quarkus classloader). GraalJS's
# Engine uses ServiceLoader to discover its implementation, and the
# implementation class (PolyglotImpl in truffle-api.jar) extends a
# superclass (AbstractPolyglotImpl in graal-sdk.jar) that lives on a
# DIFFERENT classloader — causing NoClassDefFoundError.
#
# legacy-jar uses a flat lib/ directory so all jars share the same
# classloader, eliminating the split.
# -----------------------------------------------------------------------------
quarkus.package.jar.type=legacy-jar

# -----------------------------------------------------------------------------
# Observability
# -----------------------------------------------------------------------------
quarkus.micrometer.enabled=true
quarkus.otel.enabled=false

# -----------------------------------------------------------------------------
# Event retention (forwarded to control plane via NATS, not stored locally)
# -----------------------------------------------------------------------------
quark.event.retention-days=30
quark.event.retention-batch-size=10000

# -----------------------------------------------------------------------------
# Native image build configuration — DATA PLANE (with GraalJS/Truffle)
# -----------------------------------------------------------------------------
# These settings are only used when building with the `native` Maven profile.
#
# Key flags:
#   --macro:truffle-svm
#       Statically compiles the GraalJS/Truffle interpreter into the binary.
#       This is what makes the data plane able to execute TypeScript nodes
#       at runtime. Requires Oracle GraalVM (not Mandrel). Pulls in ~29K
#       types and needs ~5 GB of builder RAM.
#   -H:+JNI
#       Required by JNI for native library loading.
#   -H:+ReportExceptionStackTraces
#       Full stack traces in build errors.
#   --initialize-at-run-time=io.nats.client.support.RandomUtils
#       NATS client creates Random instances in static fields that must not
#       be in the image heap.
#   -J--add-exports=java.base/sun.security.x509=ALL-UNNAMED
#       Required by the EdDSA library (NATS dependency) which accesses
#       internal JDK security classes.
#   -J-Xmx5g
#       Builder heap. Truffle analysis needs ~5 GB peak. On an 8 GB machine,
#       close other processes during the build.
#   --parallelism=2
#       2 threads — balances build time vs peak memory.
#   -J-XX:-UseGCOverheadLimit
#       Prevents GC overhead limit errors during the long analysis phase.
# -----------------------------------------------------------------------------
quarkus.native.additional-build-args=-H:+UnlockExperimentalVMOptions,\
  -H:+JNI,\
  -H:+ReportExceptionStackTraces,\
  --macro:truffle-svm,\
  --initialize-at-run-time=io.nats.client.support.RandomUtils,\
  -J--add-exports=java.base/sun.security.x509=ALL-UNNAMED,\
  -J-Xmx5g,\
  --parallelism=2,\
  -J-XX:-UseGCOverheadLimit

# -----------------------------------------------------------------------------
# Build-time version (populated by Maven filtering)
# -----------------------------------------------------------------------------
quark.version=0.1.0-SNAPSHOT
